document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

inecap=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"position:absolute; top:45px; left:4px; width:132px; height:90px\">\n            <x-import component-from-global-scope=\"image-slot\" id=\"{{ p.imgId }}\" shape=\"rect\" fit=\"contain\" placeholder=\"photo {{ p.name }}\" hint-size=\"132px,90px\"><\u002Fx-import>\n          <\u002Fdiv>\n\n          <div style=\"position:absolute; left:0; bottom:14px; width:100%; display:flex; flex-direction:column; align-items:center; gap:4px\">\n            <span style=\"font-size:14px; font-weight:800; color:#191919; text-align:center; line-height:1.15; padding:0 6px\">{{ p.name }}<\u002Fspan>\n            <span style=\"font-size:10px; font-weight:600; color:#B6B5B5\">1/16<\u002Fspan>\n            <span style=\"font-size:13px; font-weight:800; color:#16A34A\">{{ p.price }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 7. Fixed bottom bar (only when at least one package is selected) -->\n  <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"flex:0 0 100px; background:#FFFFFF; display:flex; align-items:flex-start; justify-content:space-between; padding:26px 10px 0 11.5px; box-sizing:border-box; z-index:2\">\n    <div style=\"display:flex; gap:11px; overflow-x:auto; max-width:196px; padding:7px 7px 2px 2px; margin:-7px -7px 0 -2px\">\n      <sc-for list=\"{{ thumbs }}\" as=\"t\" hint-placeholder-count=\"0\">\n        <div style=\"position:relative; flex:0 0 47px; width:47px; height:47px\">\n          <div style=\"width:47px; height:47px; border-radius:8.5px; box-sizing:border-box; background:#FFFFFF; border:3px solid #16A34A; overflow:hidden; display:flex; align-items:center; justify-content:center\">\n            {{ t.imgEl }}\n          <\u002Fdiv>\n          <div style=\"position:absolute; top:-6px; right:-6px; min-width:17px; height:17px; padding:0 3px; box-sizing:border-box; border-radius:9px; background:#16A34A; border:1.5px solid #FFFFFF; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#FFFFFF\">{{ t.qty }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <button onclick=\"{{ onContinue }}\" style=\"width:138px; height:42px; margin-top:3px; background:#16A34A; border:none; border-radius:3.5px; color:#FFFFFF; font-family:'Mulish',sans-serif; font-size:14px; font-weight:700; cursor:pointer\">Continuer<\u002Fbutton>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:780}}\">\nconst PRODUCTS = [\n  { name: 'Papaya', price: '2 000 CFA', cat: 'fruits' },\n  { name: 'Bissap', price: '2 000 CFA', cat: 'fruits' },\n  { name: 'Niebe', price: '2 000 CFA', cat: 'fruits' },\n  { name: 'Oignon', price: '2 000 CFA', cat: 'fruits' },\n  { name: 'Gombo', price: '2 000 CFA', cat: 'fruits' },\n  { name: 'Pasteque', price: '15 000 CFA', cat: 'fruits' },\n  { name: 'Tomate', price: '2 000 CFA', cat: 'fruits' },\n  { name: 'Arachide', price: '2 000 CFA', cat: 'grains' },\n  { name: 'Mais', price: '2 000 CFA', cat: 'grains' },\n  { name: 'Sorgho', price: '2 000 CFA', cat: 'grains' },\n  { name: 'Riz', price: '2 000 CFA', cat: 'grains' },\n  { name: 'Mil', price: '2 000 CFA', cat: 'grains' },\n  { name: 'Moringa', price: '2 000 CFA', cat: 'trees' },\n  { name: 'Baobab', price: '2 000 CFA', cat: 'trees' },\n  { name: 'Urea', price: '2 000 CFA', cat: 'fertilizer' },\n  { name: 'DAP', price: '2 000 CFA', cat: 'fertilizer' },\n  { name: 'NPK', price: '2 000 CFA', cat: 'fertilizer' },\n  { name: 'Calthio C', price: '2 000 CFA', cat: 'fertilizer' },\n  { name: 'Poulet', price: '2 000 CFA', cat: 'poultry' },\n  { name: 'Poulet Mother', price: '2 000 CFA', cat: 'poultry' }\n];\n\nconst FILTERS = ['trees', 'grains', 'poultry', 'fruits', 'fertilizer'];\n\nclass Component extends DCLogic {\n  state = { qty: {}, order: [], filter: null, imgs: {} };\n\n  componentDidMount() {\n    this.fetchImgs();\n  }\n\n  fetchImgs() {\n    const self = this;\n    fetch((window.__resources && window.__resources.slotsState) || '.image-slots.state.json', { cache: 'no-store' })\n      .then(function (r) { return r.ok ? r.json() : {}; })\n      .then(function (j) {\n        const imgs = {};\n        Object.keys(j || {}).forEach(function (k) {\n          if (j[k] && j[k].u) imgs[k] = j[k].u;\n        });\n        self.setState({ imgs: imgs });\n      })\n      .catch(function () {});\n  }\n\n  setQty(name, delta) {\n    this.fetchImgs();\n    this.setState(function (s) {\n      const qty = Object.assign({}, s.qty);\n      let order = s.order.slice();\n      const next = Math.max(0, (qty[name] || 0) + delta);\n      if (next === 0) {\n        delete qty[name];\n        order = order.filter(function (n) { return n !== name; });\n      } else {\n        qty[name] = next;\n        if (order.indexOf(name) === -1) order.push(name);\n      }\n      return { qty: qty, order: order };\n    });\n  }\n\n  renderVals() {\n    const self = this;\n    const s = this.state;\n\n    const filters = FILTERS.map(function (cat) {\n      const active = s.filter === cat;\n      return {\n        iconEl: React.createElement('img', {\n          src: (window.__resources && window.__resources['icon_' + cat + (active ? '_green' : '_gray')]) || ('icons/' + cat + (active ? '-green.svg' : '-gray.svg')),\n          style: { width: 47, height: 47, display: 'block' }\n        }),\n        color: active ? '#16A34A' : '#B6B5B5',\n        onClick: function () {\n          self.setState({ filter: active ? null : cat });\n        }\n      };\n    });\n\n    const products = PRODUCTS\n      .filter(function (p) { return !s.filter || p.cat === s.filter; })\n      .map(function (p) {\n        const q = s.qty[p.name] || 0;\n        const sel = q > 0;\n        return {\n          name: p.name,\n          imgId: 'img-' + p.name.toLowerCase().replace(/\\s+/g, '-'),\n          price: p.price,\n          qty: q,\n          selected: sel,\n          unselected: !sel,\n          bg: sel ? '#EFFAF4' : '#FFFFFF',\n          borderColor: sel ? '#16A34A' : '#D9D9D9',\n          shadow: sel\n            ? '0 0 0 2px #16A34A, 4px 4px 10px rgba(0,0,0,0.1)'\n            : '4px 4px 10px rgba(0,0,0,0.1)',\n          inc: function () { self.setQty(p.name, 1); },\n          dec: function () { self.setQty(p.name, -1); }\n        };\n      });\n\n    const thumbs = s.order.map(function (n) {\n      const key = 'img-' + n.toLowerCase().replace(/\\s+/g, '-');\n      const u = s.imgs[key] || '';\n      return {\n        name: n,\n        qty: s.qty[n] || 0,\n        imgEl: u\n          ? React.createElement('img', {\n              src: u,\n              style: { width: '100%', height: '100%', objectFit: 'contain' }\n            })\n          : null\n      };\n    });\n\n    return {\n      filters: filters,\n      products: products,\n      thumbs: thumbs,\n      hasSelection: s.order.length > 0,\n      onContinue: function () {}\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
